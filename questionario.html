<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário CARAT</title>
    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f6; --card-bg: #ffffff; --btn-blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #333; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); text-align: center; }
        .pergunta { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .opcoes { display: flex; gap: 15px; margin-top: 10px; }
        input[type="number"] { padding: 8px; width: 100%; margin-top: 5px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px 20px; font-size: 16px; width: 100%; background-color: var(--btn-blue); color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Avaliação CARAT</h1>
        
        <label><strong>ID do Utente:</strong></label>
        <input type="number" id="utente_id" placeholder="Ex: 1" required>

        <div id="formulario-perguntas"></div>

        <button onclick="submeterQuestionario()">Submeter Avaliação</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        // Gerar 10 perguntas dinamicamente para o formulário
        const container = document.getElementById('formulario-perguntas');
        for (let i = 1; i <= 10; i++) {
            const div = document.createElement('div');
            div.className = 'pergunta';
            div.innerHTML = `
                <p><strong>Pergunta ${i}:</strong> Como avalia este sintoma? (0 a 4)</p>
                <div class="opcoes">
                    <label><input type="radio" name="p${i}" value="0" checked> 0</label>
                    <label><input type="radio" name="p${i}" value="1"> 1</label>
                    <label><input type="radio" name="p${i}" value="2"> 2</label>
                    <label><input type="radio" name="p${i}" value="3"> 3</label>
                    <label><input type="radio" name="p${i}" value="4"> 4</label>
                </div>
            `;
            container.appendChild(div);
        }

        function submeterQuestionario() {
            const utente_id = document.getElementById('utente_id').value;
            if (!utente_id) return alert('Por favor, insira o ID do Utente.');

            const respostas = [];
            for (let i = 1; i <= 10; i++) {
                const resposta = document.querySelector(`input[name="p${i}"]:checked`).value;
                respostas.push(parseInt(resposta));
            }

            fetch('http://localhost:3000/avaliacoes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ utente_id: utente_id, respostas: respostas })
            })
            .then(res => res.json())
            .then(dados => {
                const resultDiv = document.getElementById('resultado');
                resultDiv.style.display = 'block';
                if (dados.erro) {
                    resultDiv.style.backgroundColor = '#f8d7da';
                    resultDiv.style.color = '#721c24';
                    resultDiv.innerText = 'Erro: ' + dados.erro;
                } else {
                    resultDiv.style.backgroundColor = '#d4edda';
                    resultDiv.style.color = '#155724';
                    resultDiv.innerHTML = `Avaliação guardada com sucesso! <br> Score Total: ${dados.score_total}`;
                }
            })
            .catch(erro => console.error('Erro:', erro));
        }
    </script>
</body>
</html>
