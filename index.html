<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SaudINOB</title>
    <style>
        :root {
            --primary: #2c3e50;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --btn-blue: #3498db;
            --btn-green: #27ae60;
            --btn-purple: #8e44ad;
            --btn-orange: #e67e22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: #333;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 { color: var(--primary); font-size: 24px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }


        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        button { 
            padding: 8px 12px; 
            font-size: 14px; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        
        .btn-blue { background-color: var(--btn-blue); }
        .btn-green { background-color: var(--btn-green); }
        .btn-purple { background-color: var(--btn-purple); }
        .btn-orange { background-color: var(--btn-orange); }

 
        ul { 
            list-style-type: none; 
            margin-top: 15px;
            max-height: 250px; 
            overflow-y: auto; 
            padding-right: 5px;
        }

    
        ul::-webkit-scrollbar { width: 6px; }
        ul::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        li { 
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 10px; 
            padding: 12px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bem-vindo à sua clínica</h1>
    </header>

    <div class="dashboard-grid">
        
        <div class="card">
            <h2>Utentes Registados <button class="btn-blue" onclick="carregarUtentes()">Carregar</button></h2>
            <ul id="lista-utentes">
                <li style="text-align: center; color: #888; border: none;">Sem dados carregados.</li>
            </ul>
        </div>

        <div class="card">
            <h2>Resultados CARAT <button class="btn-green" onclick="carregarAvaliacoes()">Carregar</button></h2>
            <ul id="lista-avaliacoes">
                <li style="text-align: center; color: #888; border: none;">Sem dados carregados.</li>
            </ul>
        </div>

        <div class="card">
            <h2>Equipa Médica <button class="btn-purple" onclick="carregarMedicos()">Carregar</button></h2>
            <ul id="lista-medicos">
                <li style="text-align: center; color: #888; border: none;">Sem dados carregados.</li>
            </ul>
        </div>

        <div class="card">
            <h2>Sintomas <button class="btn-orange" onclick="carregarSintomas()">Carregar</button></h2>
            <ul id="lista-sintomas">
                <li style="text-align: center; color: #888; border: none;">Sem dados carregados.</li>
            </ul>
        </div>
    
    <div class="card" style="max-width: 600px; margin: 20px auto;">
    <h2>Registar Sintoma</h2>
    <input type="number" id="symp-utente-id" placeholder="ID do Utente" style="padding:8px; margin-bottom:10px;">
    <input type="text" id="symp-descricao" placeholder="Ex: Dor, Inflamação" style="padding:8px; margin-bottom:10px;">
    <select id="symp-severidade" style="padding:8px; margin-bottom:10px;">
        <option value="Leve">Leve</option>
        <option value="Moderada">Moderada</option>
        <option value="Grave">Grave</option>
    </select>
    <button class="btn-orange" onclick="enviarSintoma()">Gravar na Base de Dados</button>
</div>

    </div>

    <script>
        function carregarUtentes() {
            const lista = document.getElementById('lista-utentes');
            lista.innerHTML = '<li style="text-align: center;">A carregar...</li>';
            fetch('http://localhost:3000/utentes')
                .then(resposta => resposta.json())
                .then(dados => {
                    lista.innerHTML = ''; 
                    dados.utentes.forEach(utente => {
                        const item = document.createElement('li');
                        item.innerHTML = `<strong>${utente.nome}</strong> <br> 📧 ${utente.email} | 📞 ${utente.telefone}`;
                        lista.appendChild(item);
                    });
                })
                .catch(erro => { lista.innerHTML = '<li>Erro ao carregar dados.</li>'; });
        }

        function carregarAvaliacoes() {
             const lista = document.getElementById('lista-avaliacoes');
             lista.innerHTML = '<li style="text-align: center;">A carregar...</li>';
             fetch('http://localhost:3000/avaliacoes')
             .then(resposta => resposta.json())
             .then(dados => {
                     lista.innerHTML = ''; 
                     dados.avaliacoes.forEach(avaliacao => {
                     const item = document.createElement('li');
                        
                        // Formatar a data ou indicar que não existe
                        const dataFormatada = avaliacao.data_preenchimento 
                            ? new Date(avaliacao.data_preenchimento).toLocaleString('pt-PT') 
                            : 'Data não registada';

                         item.innerHTML = `<strong>Utente ID: ${avaliacao.utente_id}</strong> <span style="color: #666; font-size: 0.9em;">(${dataFormatada})</span> <br> 
                                     Score: <strong>${avaliacao.score_total}</strong> | Interpretação: ${avaliacao.interpretacao}`;
                         lista.appendChild(item);
             });
    })
 .catch(erro => { lista.innerHTML = '<li>Erro ao carregar dados.</li>'; });
 }

        function carregarMedicos() {
            const lista = document.getElementById('lista-medicos');
            lista.innerHTML = '<li style="text-align: center;">A carregar...</li>';
            fetch('http://localhost:3000/medicos')
                .then(resposta => resposta.json())
                .then(dados => {
                    lista.innerHTML = ''; 
                    dados.medicos.forEach(medico => {
                        const item = document.createElement('li');
                        item.innerHTML = `<strong>${medico.nome}</strong> - ${medico.especialidade} <br> 
                                          📧 ${medico.email} | 📞 ${medico.telefone}`;
                        lista.appendChild(item);
                    });
                })
                .catch(erro => { lista.innerHTML = '<li>Erro ao carregar dados.</li>'; });
        }

        function carregarSintomas() {
            const lista = document.getElementById('lista-sintomas');
            lista.innerHTML = '<li style="text-align: center;">A carregar...</li>';
            fetch('http://localhost:3000/sintomas')
                .then(resposta => resposta.json())
                .then(dados => {
                    lista.innerHTML = ''; 
                    dados.sintomas.forEach(sintoma => {
                        const item = document.createElement('li');
                        
                        // Novo layout com o botão de apagar do lado direito
                        item.innerHTML = `<strong>Sintoma:</strong> ${sintoma.descricao} <br> 
                                          <strong>Severidade:</strong> ${sintoma.severidade} | <strong>ID Utente:</strong> ${sintoma.utente_id}
                                          <button onclick="apagarSintoma(${sintoma.id})" style="background-color: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 4px; margin-top: 5px; cursor: pointer; float: right; font-size: 12px;">🗑️ Apagar</button>
                                          <div style="clear: both;"></div>`;
                        lista.appendChild(item);
                    });
                })
                .catch(erro => { lista.innerHTML = '<li>Erro ao carregar dados.</li>'; });
        }

        // Função mágica para avisar o servidor para apagar o sintoma
        function apagarSintoma(id) {
            if (confirm('Tens a certeza que queres apagar este sintoma da base de dados?')) {
                fetch(`http://localhost:3000/sintomas/${id}`, {
                    method: 'DELETE'
                })
                .then(resposta => resposta.json())
                .then(dados => {
                    alert(dados.mensagem);
                    carregarSintomas(); // Recarrega a lista para o sintoma desaparecer do ecrã!
                })
                .catch(erro => console.error('Erro ao apagar:', erro));
            }
        }

        function enviarSintoma() {
            console.log("1. Botão clicado! A iniciar processo...");

            const utenteId = document.getElementById('symp-utente-id').value;
            const descricao = document.getElementById('symp-descricao').value;
            const severidade = document.getElementById('symp-severidade').value;

            // Proteção: Obriga a preencher os dados antes de enviar
            if (!utenteId || !descricao) {
                alert("⚠️ Por favor, preenche o ID do Utente e a Descrição do sintoma!");
                return;
            }

            const dados = {
                utente_id: parseInt(utenteId), // Garante que o ID é um número
                descricao: descricao,
                severidade: severidade
            };

            console.log("2. A enviar estes dados para o servidor:", dados);

            fetch('http://localhost:3000/sintomas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            })
            .then(res => {
                console.log("3. O servidor respondeu! Status:", res.status);
                if (!res.ok) {
                    throw new Error("O servidor deu erro (Status " + res.status + ")");
                }
                return res.json();
            })
            .then(dadosRecebidos => {
                console.log("4. Sucesso total!", dadosRecebidos);
                alert("✅ Sintoma guardado na Base de Dados!");
                
                // Limpa as caixinhas de texto depois de gravar
                document.getElementById('symp-descricao').value = '';
                document.getElementById('symp-utente-id').value = '';
                
                carregarSintomas(); // Atualiza a lista laranja
            })
            .catch(err => {
                console.error('❌ Erro detetado:', err);
                alert('Erro ao guardar. Abre a consola (F12) para ver o que falhou!');
            });
        }

    </script>
</body>
</html>
